name: Keep Render Alive

on:
  schedule:
    # 每 10 分鐘 ping 一次（GitHub Actions 最小間隔為 5 分鐘）
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 也可手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          echo "Pinging Render service..."
          curl -sSf --max-time 60 https://calligraphy-analyzer.onrender.com/ \
            -o /dev/null -w "HTTP status: %{http_code}, time: %{time_total}s\n" \
            || echo "Ping timed out (server was sleeping, now warming up)"
