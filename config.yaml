# === 索引配置 ===
index:
  fonts_index: "./data/index/fonts_index.json"
  character_index: "./data/index/character_index.json"
  style_features: "./data/index/style_features.json"
  similarity_matrix: "./data/index/similarity_matrix.json"

# === FFT 分析參數 ===
fft:
  n_coefficients: 50      # 傅立葉係數數量
  target_length: 50       # 目標頻率長度
  canvas_size: 512        # 畫布尺寸

# === 風格分析參數 ===
style_analysis:
  features:
    - "low_freq_energy"     # 低頻能量（整體結構）
    - "mid_freq_energy"     # 中頻能量（筆畫特徵）
    - "high_freq_energy"    # 高頻能量（細節）
    - "spectral_centroid"   # 頻譜重心
    - "dc_fund_ratio"       # DC/基頻比
    - "spectral_slope"      # 頻譜斜率
    - "hf_decay_rate"       # 高頻衰減率

  max_samples: 30           # 每位書法家的最大樣本數（快速測試用）
  full_samples: null        # null = 使用所有樣本

# === 輸出配置 ===
output:
  base_dir: "./output"
  reports: "./output/reports"
  animations: "./output/animations"
  temp: "./output/temp"

# === GUI 配置 ===
gui:
  window_width: 1550
  window_height: 880
  animation_view_width: 1200
  animation_view_height: 800
  default_coefficients: 50

# === 臨時檔案 ===
temp:
  clean_image: "./output/temp/temp_clean.png"
  svg_file: "./output/temp/temp.svg"
  binary_file: "./output/temp/temp_binary.png"
