{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="/static/css/index.css?v=7">
{% endblock %}

{% block content %}
<!-- 主視覺區 -->
<section class="hero">
    <h1 class="hero-title">字庫搜尋</h1>
    <p class="hero-subtitle">收錄 <span id="charTotalHint">1,024</span> 個字・點擊即可前往批次比對</p>
</section>

<!-- 字庫瀏覽區 -->
<section class="quick-select">
    <div class="card">
        <h3 class="card-title">全書法家共有字 <span class="badge badge-count" id="commonCount"></span></h3>
        <p class="quick-hint">以下是所有書法家都有的字，點擊即可前往比對</p>
        <div class="char-pills" id="commonChars">
            <div class="loading" style="min-height:60px"></div>
        </div>
    </div>
</section>

<!-- 歷史紀錄區 -->
<section class="history-section" id="historySection" style="display:none">
    <div class="card">
        <div class="history-header">
            <h3 class="card-title">最近查詢</h3>
            <button class="btn-text-sm" onclick="clearHistory()">清除紀錄</button>
        </div>
        <div class="char-pills" id="historyChars"></div>
    </div>
</section>

<!-- 統計區 -->
<section class="stats-section">
    <div class="grid-3-wide stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="statTotal">-</div>
            <div class="stat-label">可比對字元</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statCommon">-</div>
            <div class="stat-label">全部共有字</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statCalligraphers">-</div>
            <div class="stat-label">書法家<span class="stat-sublabel">（<span id="statBooks">-</span> 本字帖）</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statImages">-</div>
            <div class="stat-label">書法圖片</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statViews">-</div>
            <div class="stat-label">總瀏覽次數</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statVisitors">-</div>
            <div class="stat-label">累計訪客</div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/index.js?v=7"></script>
{% endblock %}
