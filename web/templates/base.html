<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 動態標題 -->
    <title>{{ title }} - 墨跡習字</title>

    <!-- SEO meta -->
    <meta name="description" content="{{ page_desc | default('輸入任一中文字，即時比較智永、沈尹默、顏真卿、趙孟頫、歐陽詢五位書法大師的筆法。使用傅立葉描述子（FFT）分析書法風格。') }}">
    <meta name="keywords" content="{{ page_keywords | default('書法,書法比較,書法分析,智永,沈尹默,顏真卿,趙孟頫,歐陽詢,楷書,行書,FFT,傅立葉,風格分析') }}">
    <meta name="author" content="墨跡習字">
    <meta name="robots" content="index, follow">


<link rel="icon" href="/favicon.ico" type="image/png">

    <!-- 字體：標題用 Noto Serif TC（襯線，書卷氣），內文/UI 用 Noto Sans TC（無襯線，易讀） -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/base.css?v=7">
    {% block head %}{% endblock %}

    <!-- JSON-LD 結構化資料 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "墨跡習字",
      "description": "輸入中文字，即時比較多位書法大師的筆法差異，並上傳練習作品取得筆劃差異診斷",
      "url": "{{ request.url.scheme }}://{{ request.url.netloc }}",
      "inLanguage": "zh-TW",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{{ request.url.scheme }}://{{ request.url.netloc }}/explorer?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
</head>
<body>
    <!-- 導航列 -->
    <nav class="main-nav">
        <div class="nav-container">
            <a href="/about" class="nav-brand">
                <img src="/favicon.ico" class="brand-logo" alt="墨跡習字 logo" onerror="this.style.display='none'">
                <span class="brand-text">墨跡習字</span>
            </a>
            <button class="nav-toggle" onclick="toggleNav()">&#9776;</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="/about"         class="{% if active == 'about'         %}active{% endif %}">關於</a></li>
                <li><a href="/compare"       class="{% if active == 'compare'       %}active{% endif %}">字庫搜尋</a></li>
                <li><a href="/explorer"      class="{% if active == 'explorer'      %}active{% endif %}">字元探索</a></li>
                <li><a href="/stroke-order"  class="{% if active == 'stroke-order'  %}active{% endif %}">筆順動畫</a></li>
                <li><a href="/analysis"      class="{% if active == 'analysis'      %}active{% endif %}">風格特徵</a></li>
                <li><a href="/calligraphers" class="{% if active == 'calligraphers' %}active{% endif %}">認識書法家</a></li>
                <li><a href="/score"         class="{% if active == 'score'         %}active{% endif %}">筆劃診斷</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主要內容 -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <!-- 頁尾 -->
    <footer class="site-footer">
        <div class="footer-container">
            <p>墨跡習字 | 以數位科技，量化書法大師的筆法精髓</p>
            <p class="footer-sub" id="footerStats">載入中…</p>
        </div>
    </footer>

    <!-- 全局圖片放大模態 -->
    <div id="imageModal" class="modal" onclick="closeImageModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeImageModal()">&times;</button>
            <button class="modal-nav modal-prev" id="modalPrev" onclick="navigateModal(-1)" style="display:none" aria-label="上一張">&#8249;</button>
            <button class="modal-nav modal-next" id="modalNext" onclick="navigateModal(1)"  style="display:none" aria-label="下一張">&#8250;</button>
            <img id="modalImage" src="" alt="放大檢視">
            <p id="modalCaption" class="modal-caption"></p>
            <p id="modalCounter" class="modal-counter" style="display:none"></p>
        </div>
    </div>

    <script src="/static/js/common.js?v=3"></script>
    {% block scripts %}{% endblock %}

    <!-- 頁尾動態統計 -->
    <script>
    (async function loadFooterStats() {
        try {
            const [calData, statsData, searchData] = await Promise.all([
                fetch('/api/calligrapher/list').then(r => r.json()),
                fetch('/api/stats/overview').then(r => r.json()),
                fetch('/api/search/stats').then(r => r.json()),
            ]);
            const allBooks = calData.calligraphers || [];
            const books  = allBooks.length;
            const cals   = new Set(allBooks.map(c => c.display_name)).size;
            const images = allBooks.reduce((s, c) => s + (c.total_images || 0), 0);
            const chars  = searchData.total_characters || 0;
            const views  = statsData.total_views || 0;
            const el = document.getElementById('footerStats');
            if (el) el.textContent =
                `收錄 ${cals} 位書法家 | ${books} 本字帖 | ${images} 張書法圖片 | ${chars} 個字元 | 累計瀏覽 ${views} 次`;
        } catch(e) {
            const el = document.getElementById('footerStats');
            if (el) el.textContent = '墨跡習字';
        }
    })();
    </script>
</body>
</html>
