<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 動態標題 -->
    <title>{{ title }} - 墨跡習字</title>

    <!-- SEO meta -->
    <meta name="description" content="{{ page_desc | default('輸入任一中文字，即時比較智永、沈尹默、顏真卿、趙孟頫、歐陽詢五位書法大師的筆法。使用傅立葉描述子（FFT）分析書法風格。') }}">
    <meta name="keywords" content="{{ page_keywords | default('書法,書法比較,書法分析,智永,沈尹默,顏真卿,趙孟頫,歐陽詢,楷書,行書,FFT,傅立葉,風格分析') }}">
    <meta name="author" content="墨跡習字">
    <meta name="robots" content="index, follow">

    <!-- OpenGraph (社群分享) -->
    <meta property="og:type"        content="website">
    <meta property="og:title"       content="{{ title }} - 墨跡習字">
    <meta property="og:description" content="{{ page_desc | default('輸入任一中文字，即時比較五位書法大師的筆法差異。') }}">
    <meta property="og:locale"      content="zh_TW">
    <meta property="og:site_name"   content="墨跡習字">
    <meta property="og:image"       content="{{ og_image | default('/static/images/og-default.png') }}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="{{ title }} - 墨跡習字">
    <meta name="twitter:description" content="{{ page_desc | default('輸入任一中文字，即時比較五位書法大師的筆法差異。') }}">
    <meta name="twitter:image"       content="{{ og_image | default('/static/images/og-default.png') }}">

    <link rel="stylesheet" href="/static/css/base.css">
    {% block head %}{% endblock %}

    <!-- JSON-LD 結構化資料 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "墨跡習字",
      "description": "使用傅立葉描述子（FFT）分析書法風格，支援多位大師同字比對",
      "url": "{{ request.url.scheme }}://{{ request.url.netloc }}",
      "inLanguage": "zh-TW",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{{ request.url.scheme }}://{{ request.url.netloc }}/explorer?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
</head>
<body>
    <!-- 導航列 -->
    <nav class="main-nav">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="brand-icon">墨</span>
                <span class="brand-text">墨跡習字</span>
            </a>
            <button class="nav-toggle" onclick="toggleNav()">&#9776;</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="/"              class="{% if active == 'index'         %}active{% endif %}">同字比對</a></li>
                <li><a href="/analysis"      class="{% if active == 'analysis'      %}active{% endif %}">風格 DNA</a></li>
                <li><a href="/calligraphers" class="{% if active == 'calligraphers' %}active{% endif %}">認識書法家</a></li>
                <li><a href="/compare"       class="{% if active == 'compare'       %}active{% endif %}">批次比對</a></li>
                <li><a href="/explorer"      class="{% if active == 'explorer'      %}active{% endif %}">字元探索</a></li>
                <li><a href="/score"         class="{% if active == 'score'         %}active{% endif %}">上傳 &amp; 評分</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主要內容 -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <!-- 頁尾 -->
    <footer class="site-footer">
        <div class="footer-container">
            <p>墨跡習字 | 使用傅立葉描述子（FFT）分析書法風格</p>
            <p class="footer-sub" id="footerStats">載入中…</p>
        </div>
    </footer>

    <!-- 全局圖片放大模態 -->
    <div id="imageModal" class="modal" onclick="closeImageModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeImageModal()">&times;</button>
            <img id="modalImage" src="" alt="放大檢視">
            <p id="modalCaption" class="modal-caption"></p>
        </div>
    </div>

    <script src="/static/js/common.js"></script>
    {% block scripts %}{% endblock %}

    <!-- 頁尾動態統計 -->
    <script>
    (async function loadFooterStats() {
        try {
            const [calData, statsData, searchData] = await Promise.all([
                fetch('/api/calligrapher/list').then(r => r.json()),
                fetch('/api/stats/overview').then(r => r.json()),
                fetch('/api/search/stats').then(r => r.json()),
            ]);
            const cals   = (calData.calligraphers || []).length;
            const images = (calData.calligraphers || []).reduce((s, c) => s + (c.total_images || 0), 0);
            const chars  = searchData.total_characters || 0;
            const views  = statsData.total_views || 0;
            const el = document.getElementById('footerStats');
            if (el) el.textContent =
                `收錄 ${cals} 位書法大師 | ${images} 張書法圖片 | ${chars} 個字元 | 累計瀏覽 ${views} 次`;
        } catch(e) {
            const el = document.getElementById('footerStats');
            if (el) el.textContent = '墨跡習字';
        }
    })();
    </script>
</body>
</html>
