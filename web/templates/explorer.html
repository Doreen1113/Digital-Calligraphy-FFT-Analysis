{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="/static/css/explorer.css?v=4">
{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="page-title">字元探索</h1>
    <p class="page-subtitle">瀏覽所有可比對的字元，支援多種篩選與排序方式</p>
    <p class="page-notice">目前收錄 <strong>1,010</strong> 個字元，涵蓋 <strong>7</strong> 位書法大師——若找不到某字，表示尚未收錄。</p>
</section>

<!-- 篩選、排序與搜尋 -->
<section class="explorer-controls">
    <div class="card">

        <!-- 第一行：書法家數量篩選 + 搜尋 -->
        <div class="controls-row">
            <div class="filter-group">
                <label>書法家數量篩選</label>
                <div class="filter-btns" id="filterBtns">
                    <!-- 動態加載 -->
                </div>
            </div>

            <div class="search-group">
                <label for="searchInput">搜尋字元</label>
                <div class="search-wrapper">
                    <input type="text"
                           id="searchInput"
                           class="form-input"
                           placeholder="漢字或拼音（如 tian）"
                           autocomplete="off">
                    <button class="btn btn-primary btn-sm" onclick="doSearch()">搜尋</button>
                </div>
            </div>
        </div>

        <!-- 第二行：依書法家篩選 + 排序 -->
        <div class="controls-row controls-row-secondary">
            <div class="filter-group">
                <label>依書法家篩選</label>
                <div class="filter-btns cal-filter-btns" id="calFilterBtns">
                    <!-- 動態加載 -->
                </div>
            </div>

            <div class="filter-group">
                <label>排序方式</label>
                <div class="filter-btns sort-btns" id="sortBtns">
                    <button class="filter-btn active" onclick="setSortOrder(this, 'default')">預設</button>
                    <button class="filter-btn" onclick="setSortOrder(this, 'freq')">字頻序 ↓</button>
                    <button class="filter-btn" onclick="setSortOrder(this, 'strokes_asc')">筆畫少→多</button>
                    <button class="filter-btn" onclick="setSortOrder(this, 'strokes_desc')">筆畫多→少</button>
                </div>
            </div>
        </div>

        <!-- 第三行：依部首篩選 -->
        <div class="controls-row controls-row-secondary">
            <div class="filter-group radical-filter-group">
                <label>依部首篩選 <span class="radical-count-badge" id="radicalCountBadge"></span></label>
                <div class="filter-btns radical-filter-btns" id="radicalFilterBtns">
                    <!-- 動態加載 -->
                </div>
            </div>
        </div>

        <!-- 統計 -->
        <div class="stats-bar" id="statsBar">
            <span id="filterInfo">載入中...</span>
        </div>
    </div>
</section>

<!-- 字元網格 -->
<section class="explorer-grid-section">
    <div class="card">
        <div class="char-grid" id="charGrid">
            <div class="loading" style="min-height:200px"></div>
        </div>

        <!-- 分頁 -->
        <div class="pagination" id="pagination"></div>
    </div>
</section>

<!-- 字元詳情 Popup -->
<div id="charDetailModal" class="modal" onclick="closeCharDetail()">
    <div class="modal-content char-detail-modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeCharDetail()">&times;</button>
        <h3 class="modal-title" id="charDetailTitle"></h3>
        <div id="charDetailBody"></div>
        <div class="detail-actions">
            <button class="btn btn-secondary" onclick="closeCharDetail()">關閉</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/explorer.js?v=3"></script>
{% endblock %}
